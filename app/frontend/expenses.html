<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Budgetis - Dépenses</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body data-page="expenses">
  <header>
    <h1>Dépenses</h1>
    <nav>
      <a href="index.html">Accueil</a>
      <a href="budget.html">Budgets</a>
      <a href="expenses.html">Dépenses</a>
      <a href="savings.html">Épargne</a>
      <a href="advice.html">Conseils</a>
    </nav>
  </header>
  <div class="container">
    <div class="card">
      <h2>Ajouter une dépense</h2>
      <form id="expense-form">
        <input name="budget_id" type="number" placeholder="ID budget" required />
        <input name="amount" type="number" step="0.01" placeholder="Montant" required />
        <input name="category" placeholder="Catégorie" required />
        <input name="payment_method" placeholder="Paiement (CB, cash...)" />
        <input name="description" placeholder="Description" />
        <button type="submit">Ajouter</button>
      </form>
    </div>
    <div class="card">
      <h2>Liste des dépenses</h2>
      <div id="expense-list"></div>
    </div>
  </div>
  <script src="assets/main.js"></script>
</body>
</html>
