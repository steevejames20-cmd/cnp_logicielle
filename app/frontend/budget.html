<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Budgetis - Budgets</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body data-page="budget">
  <header>
    <h1>Budgets</h1>
    <nav>
      <a href="index.html">Accueil</a>
      <a href="budget.html">Budgets</a>
      <a href="expenses.html">Dépenses</a>
      <a href="savings.html">Épargne</a>
      <a href="advice.html">Conseils</a>
    </nav>
  </header>
  <div class="container">
    <div class="card">
      <h2>Créer un budget</h2>
      <form id="budget-form">
        <input name="name" placeholder="Nom" required />
        <input name="amount" type="number" step="0.01" placeholder="Montant" required />
        <select name="period">
          <option value="monthly">Mensuel</option>
          <option value="weekly">Hebdomadaire</option>
          <option value="daily">Quotidien</option>
        </select>
        <button type="submit">Ajouter</button>
      </form>
    </div>
    <div class="card">
      <h2>Liste des budgets</h2>
      <div id="budget-list"></div>
    </div>
  </div>
  <script src="assets/main.js"></script>
</body>
</html>
