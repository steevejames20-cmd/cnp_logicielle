<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Budgetis - Épargne</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body data-page="savings">
  <header>
    <h1>Objectifs d'épargne</h1>
    <nav>
      <a href="index.html">Accueil</a>
      <a href="budget.html">Budgets</a>
      <a href="expenses.html">Dépenses</a>
      <a href="savings.html">Épargne</a>
      <a href="advice.html">Conseils</a>
    </nav>
  </header>
  <div class="container">
    <div class="card">
      <h2>Créer un objectif</h2>
      <form id="saving-form">
        <input name="name" placeholder="Nom" required />
        <input name="target_amount" type="number" step="0.01" placeholder="Montant cible" required />
        <input name="saved_amount" type="number" step="0.01" placeholder="Montant déjà épargné" />
        <input name="deadline" type="date" />
        <button type="submit">Ajouter</button>
      </form>
    </div>
    <div class="card">
      <h2>Objectifs</h2>
      <div id="saving-list"></div>
    </div>
  </div>
  <script src="assets/main.js"></script>
</body>
</html>
